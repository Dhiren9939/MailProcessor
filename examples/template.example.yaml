AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: MailProcessor Lambda example template.

Parameters:
  MailBucket:
    Type: String
    Description: S3 bucket where SES stores inbound raw emails.
  ForwarderEmail:
    Type: String
    Description: Verified SES email address used as the forwarding sender.
  RecipientEmail:
    Type: String
    Description: Email address that receives forwarded mail and error alerts.

Resources:
  MailProcessor:
    Type: AWS::Serverless::Function
    Properties:
      Architectures:
        - x86_64
      CodeUri: src/
      Handler: index.handler
      Runtime: nodejs24.x
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          MAIL_BUCKET: !Ref MailBucket
          FORWARDER_EMAIL: !Ref ForwarderEmail
          RECIPIENT_EMAIL: !Ref RecipientEmail
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref MailBucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${MailBucket}/*
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

Outputs:
  MailProcessorFunctionArn:
    Description: Lambda function ARN.
    Value: !GetAtt MailProcessor.Arn
